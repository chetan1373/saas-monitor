version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d saas_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
